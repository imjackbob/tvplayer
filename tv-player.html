<!DOCTYPE html>
  <html>
  <head>
  <meta charset="utf-8">
  <title>TV Player</title>
  <style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  #player { width: 100%; height: 100%; border: 0; }
  </style>
  </head>
  <body>
  <div id="player"></div>
  <script>
  (function(){
      var params = new URLSearchParams(location.search);
      var videoId = params.get('v') || '';
      var startSeconds = parseInt(params.get('t') || '0', 10) || 0;
      var tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
      window.onYouTubeIframeAPIReady = function(){
          if (!videoId) return;
          new YT.Player('player', {
              videoId: videoId,
              playerVars: {
                  autoplay: 1, start: startSeconds, mute: 1, controls: 0,
                  modestbranding: 1, rel: 0, playsinline: 1, fs: 0,
                  iv_load_policy: 3, disablekb: 1
              },
              events: {
                  onReady: function(e) { try { e.target.playVideo(); } catch(_){} },
                  onStateChange: function(e) {
                      if (e.data === 1) { try { e.target.unMute(); } catch(_){} }
                  }
              }
          });
      };
  })();
  </script>
  </body>
  </html>
