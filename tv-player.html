  <!DOCTYPE html>
  <html>
  <head>
  <meta charset="utf-8">
  <title>TV Player</title>
  <style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
  </style>
  </head>
  <body>
  <iframe id="player"
          allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
          frameborder="0"
          allowfullscreen></iframe>
  <script>
  (function(){
      var params = new URLSearchParams(location.search);
      var videoId = params.get('v') || '';
      var startSeconds = parseInt(params.get('t') || '0', 10) || 0;
      if (!videoId) return;
      var iframe = document.getElementById('player');
      iframe.src = 'https://www.youtube.com/embed/' + encodeURIComponent(videoId) +
                   '?autoplay=1&start=' + startSeconds +
                   '&controls=0&modestbranding=1&rel=0&playsinline=1&fs=0&iv_load_policy=3&disablekb=1' +
                   '&enablejsapi=1';
      var apiTag = document.createElement('script');
      apiTag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(apiTag);
      window.onYouTubeIframeAPIReady = function(){
          try {
              var player = new YT.Player(iframe, {
                  events: {
                      onReady: function(e){ try { e.target.playVideo(); } catch(_){} },
                      onStateChange: function(e){
                          if (e.data === -1 || e.data === 5) {
                              try { e.target.playVideo(); } catch(_){}
                          }
                      }
                  }
              });
          } catch(_){}
      };
  })();
  </script>
  </body>
  </html>
